{% extends "base.html" %}

{% block content %}
<h1>Register as Shopper</h1>

<form method="post">
{% csrf_token %}

<label>Username</label>
<input name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Create Shopper Account</button>

</form>
{% endblock %}
