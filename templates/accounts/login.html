{% extends "base.html" %}
{% load static %}

{% block title %}InstrWear - Login{% endblock %}

{% block content %}
<main class="iw-auth-page">
    <section class="iw-auth-shell">
        <div class="iw-auth-card iw-auth-card-login">
            <a href="{% url 'landing' %}" class="iw-auth-logo">INSTRWEAR</a>
            <p class="iw-auth-subtitle">Choose your account type and log in</p>

            <div class="iw-role-selector" role="tablist" aria-label="Select login role">
                <button type="button" class="iw-role-option {% if role == 'shopper' %}active{% endif %}" data-role="shopper">
                    <span class="iw-role-icon">🛍</span>
                    <span class="iw-role-label">Shopper</span>
                </button>
                <button type="button" class="iw-role-option {% if role == 'merchant' %}active{% endif %}" data-role="merchant">
                    <span class="iw-role-icon">🏪</span>
                    <span class="iw-role-label">Merchant</span>
                </button>
            </div>

            <form method="post" class="iw-auth-form" id="loginForm" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="role" id="roleInput" value="{{ role|default:'shopper' }}">

                <div class="iw-form-group">
                    <label class="iw-form-label" for="email">Email Address</label>
                    <input
                        id="email"
                        class="iw-form-input"
                        type="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="iw-form-group">
                    <label class="iw-form-label" for="password">Password</label>
                    <input
                        id="password"
                        class="iw-form-input"
                        type="password"
                        name="password"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="iw-auth-submit">Log In</button>
            </form>

            <div class="iw-auth-footer">
                <p>Need an account? <a href="{% url 'register_choice' %}">Create one</a></p>
                <a href="{% url 'landing' %}" class="iw-auth-back-link">Back to landing page</a>
            </div>
        </div>
    </section>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
