<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#0b0b0f;font-family:Arial,Helvetica,sans-serif;">
    <div style="max-width:600px;margin:0 auto;padding:24px;">
      <div style="background:#12121a;border:1px solid #24243a;border-radius:14px;overflow:hidden;">
        <div style="padding:18px 22px;background:#0f0f16;border-bottom:1px solid #24243a;">
          <div style="font-size:18px;font-weight:700;letter-spacing:0.4px;color:#f5f5ff;">
            InstrWear
          </div>
          <div style="font-size:12px;color:#b7b7d6;margin-top:6px;">
            Welcome to the marketplace
          </div>
        </div>

        <div style="padding:22px;color:#e9e9ff;">
          <h1 style="margin:0 0 10px 0;font-size:18px;line-height:1.3;">
            Welcome, {{ email }} 👋
          </h1>

          <p style="margin:0 0 14px 0;font-size:14px;line-height:1.6;color:#cfcfe8;">
            Your InstrWear account is ready. You can now sign in and start exploring.
          </p>

          <div style="margin:18px 0;">
            <a href="{{ login_url }}"
               style="display:inline-block;background:#6d28d9;color:#ffffff;text-decoration:none;
                      padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;">
              Sign in to InstrWear
            </a>
          </div>

          <p style="margin:18px 0 0 0;font-size:12px;line-height:1.5;color:#9a9ab8;">
            If you didn’t create this account, you can ignore this email.
          </p>
        </div>

        <div style="padding:14px 22px;background:#0f0f16;border-top:1px solid #24243a;">
          <div style="font-size:12px;color:#9a9ab8;">
            © {{ year }} InstrWear · All rights reserved
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
