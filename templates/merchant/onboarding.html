{% load static %}
<!--
Author: Sadik Mohamud
Project: InstrWear
File: templates/merchant/onboarding.html
Purpose: Merchant onboarding template
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTRWEAR - MERCHANT REGISTRATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FFFDF5;
            --fg: #000000;
            --accent: #FF6B6B;
            --secondary: #FFD93D;
            --muted: #C4B5FD;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--white);
            border: 4px solid var(--fg);
            padding: 50px 40px;
            position: relative;
            z-index: 1;
            box-shadow: 16px 16px 0 0 #000;
            transform: rotate(1deg);
        }

        .badge {
            position: absolute;
            top: -25px;
            right: 50px;
            background: var(--secondary);
            border: 4px solid var(--fg);
            padding: 10px 24px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transform: rotate(-5deg);
            box-shadow: 6px 6px 0 0 #000;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            background: var(--secondary);
            padding: 8px;
            border: 4px solid var(--fg);
            box-shadow: 4px 4px 0 0 #000;
        }

        .messages {
            margin-bottom: 24px;
            display: grid;
            gap: 12px;
        }

        .message {
            border: 4px solid var(--fg);
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            background: var(--white);
            box-shadow: 4px 4px 0 0 #000;
        }

        .message.error {
            background: #ffe3e3;
        }

        .message.success {
            background: #dcfce7;
        }

        .profile-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            background: var(--muted);
            border: 4px solid var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            cursor: pointer;
            transition: all 0.1s ease-out;
            position: relative;
            overflow: hidden;
            box-shadow: 8px 8px 0 0 #000;
            transform: rotate(-2deg);
        }

        .profile-pic:hover {
            transform: rotate(-2deg) translateY(-6px);
            box-shadow: 14px 14px 0 0 #000;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-label {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 10px 20px;
            background: var(--accent);
            color: var(--white);
            border: 4px solid var(--fg);
            box-shadow: 6px 6px 0 0 #000;
            transition: all 0.1s;
        }

        .upload-label:hover {
            transform: translateY(-3px);
            box-shadow: 9px 9px 0 0 #000;
        }

        #profileImageInput {
            display: none;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .form-input {
            width: 100%;
            background: var(--white);
            border: 4px solid var(--fg);
            padding: 16px 18px;
            font-size: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 0 #000;
        }

        .form-input:focus {
            outline: none;
            background: var(--muted);
            box-shadow: 6px 6px 0 0 #000;
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: rgba(0, 0, 0, 0.3);
            font-weight: 500;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .divider {
            height: 4px;
            background: var(--fg);
            margin: 40px 0;
            position: relative;
            box-shadow: 4px 4px 0 0 #000;
        }

        .divider::after {
            content: '⬥';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 15px;
            font-size: 24px;
            font-weight: 900;
        }

        .address-section {
            background: var(--secondary);
            border: 4px solid var(--fg);
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 12px 12px 0 0 #000;
            transform: rotate(-1deg);
        }

        .section-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: var(--white);
            padding: 8px 12px;
            border: 4px solid var(--fg);
            display: inline-block;
            box-shadow: 4px 4px 0 0 #000;
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            border: 4px solid var(--fg);
            color: var(--white);
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.1s;
            margin-top: 30px;
            font-family: 'Space Grotesk', sans-serif;
            box-shadow: 12px 12px 0 0 #000;
            transform: rotate(-1deg);
        }

        .btn-submit:hover {
            transform: rotate(-1deg) translateY(-5px);
            box-shadow: 17px 17px 0 0 #000;
        }

        .shape {
            position: absolute;
            border: 4px solid var(--fg);
            box-shadow: 4px 4px 0 0 #000;
        }

        .shape-1 {
            width: 80px;
            height: 80px;
            background: var(--accent);
            top: -40px;
            left: -40px;
            transform: rotate(45deg);
        }

        .shape-2 {
            width: 50px;
            height: 50px;
            background: var(--muted);
            bottom: 60px;
            right: -25px;
            transform: rotate(-12deg);
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                transform: rotate(0deg);
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 36px;
            }

            .badge {
                right: 20px;
                top: -20px;
            }

            .address-section,
            .btn-submit {
                transform: rotate(0deg);
            }

            .btn-submit:hover {
                transform: translateY(-5px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">BUSINESS</div>
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>

        <div class="logo">INSTRWEAR</div>
        <p class="subtitle">Merchant Registration</p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="profile-upload">
                <div class="profile-pic" onclick="document.getElementById('profileImageInput').click()">
                    <span id="profilePlaceholder">🏪</span>
                    <img
                        id="profilePreview"
                        {% if merchant.logo %}
                            src="{{ merchant.logo.url }}"
                            style="display:block;"
                        {% else %}
                            style="display:none;"
                        {% endif %}
                        alt="Business Logo Preview"
                    >
                </div>

                <label class="upload-label" for="profileImageInput">UPLOAD LOGO</label>
                <input type="file" id="profileImageInput" name="logo" accept="image/*">
            </div>

            <div class="form-group">
                <label class="form-label">Business Name</label>
                <input
                    type="text"
                    class="form-input"
                    name="business_name"
                    placeholder="Urban Style Boutique"
                    value="{{ merchant.business_name|default:'' }}"
                    required
                >
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input
                        type="text"
                        class="form-input"
                        name="first_name"
                        placeholder="Sarah"
                        value="{{ request.user.first_name|default:'' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input
                        type="text"
                        class="form-input"
                        name="last_name"
                        placeholder="Johnson"
                        value="{{ request.user.last_name|default:'' }}"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Business Phone</label>
                <input
                    type="tel"
                    class="form-input"
                    name="phone"
                    placeholder="020 7123 4567"
                    value="{{ merchant.phone|default:'' }}"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label">Business Bio</label>
                <textarea
                    class="form-input"
                    name="bio"
                    rows="4"
                    placeholder="Tell shoppers about your store..."
                >{{ merchant.bio|default:'' }}</textarea>
            </div>

            <div class="divider"></div>

            <div class="address-section">
                <h3 class="section-title">📍 BUSINESS LOCATION</h3>

                <div class="form-group">
                    <label class="form-label">Shop Number/Name</label>
                    <input
                        type="text"
                        class="form-input"
                        name="house"
                        placeholder="24"
                        value="{{ merchant.house|default:'' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Street</label>
                    <input
                        type="text"
                        class="form-input"
                        name="street"
                        placeholder="Oxford Street"
                        value="{{ merchant.street|default:'' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Town/City</label>
                    <input
                        type="text"
                        class="form-input"
                        name="city"
                        placeholder="London"
                        value="{{ merchant.city|default:'' }}"
                        required
                    >
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">County</label>
                        <input
                            type="text"
                            class="form-input"
                            name="county"
                            placeholder="Greater London"
                            value="{{ merchant.county|default:'' }}"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Postcode</label>
                        <input
                            type="text"
                            class="form-input"
                            name="postcode"
                            placeholder="W1D 1BS"
                            value="{{ merchant.postcode|default:'' }}"
                            required
                        >
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">LAUNCH STORE →</button>
        </form>
    </div>

    <script>
        document.getElementById('profileImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profilePreview').src = e.target.result;
                    document.getElementById('profilePreview').style.display = 'block';
                    document.getElementById('profilePlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
